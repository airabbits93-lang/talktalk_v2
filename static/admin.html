<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FAQ 관리자</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 900px;
        margin: 0 auto;
        padding: 32px 20px;
        color: #222;
        background: #fafafa;
      }
      h1 { margin: 0 0 4px; font-size: 22px; }
      p.hint { margin: 0 0 20px; color: #666; font-size: 14px; }

      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        align-items: center;
        flex-wrap: wrap;
      }
      button {
        padding: 8px 16px;
        border: 1px solid #d0d0d0;
        background: #fff;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }
      button.primary { background: #03c75a; color: #fff; border-color: #03c75a; }
      button:hover { opacity: 0.85; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      a.notion-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: #000;
        color: #fff;
        border-radius: 6px;
        font-size: 14px;
        text-decoration: none;
      }
      a.notion-link:hover { opacity: 0.8; }

      #status {
        font-size: 13px;
        color: #666;
        margin-left: 4px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      }
      th {
        background: #f0f0f0;
        padding: 10px 14px;
        text-align: left;
        font-size: 13px;
        color: #555;
        font-weight: 600;
      }
      td {
        padding: 10px 14px;
        font-size: 14px;
        border-top: 1px solid #eee;
        vertical-align: top;
      }
      tr:hover td { background: #fafafa; }
      .empty { text-align: center; color: #999; padding: 32px; font-size: 14px; }

      hr { border: none; border-top: 1px solid #eee; margin: 32px 0 20px; }

      .test-row {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      .test-row input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
      }
      #testResult {
        padding: 12px 14px;
        background: #fff;
        border: 1px solid #eee;
        border-radius: 6px;
        font-size: 14px;
        white-space: pre-wrap;
        min-height: 40px;
        color: #444;
      }
    </style>
  </head>
  <body>
    <h1>FAQ 관리자</h1>
    <p class="hint">노션 테이블에서 FAQ를 편집하면 5분 이내 자동 반영됩니다. 즉시 반영하려면 새로고침 버튼을 누르세요.</p>

    <div class="toolbar">
      <a class="notion-link" href="https://notion.so/366e00a8b9f680b68204d2d9d9e38d1d" target="_blank">
        &#9632; 노션에서 편집
      </a>
      <button id="refreshBtn" class="primary">새로고침</button>
      <span id="status">불러오는 중...</span>
    </div>

    <table id="faqTable">
      <thead>
        <tr><th style="width:35%">질문 / 키워드</th><th>답변</th></tr>
      </thead>
      <tbody id="faqBody">
        <tr><td colspan="2" class="empty">불러오는 중...</td></tr>
      </tbody>
    </table>

    <hr />

    <h2 style="font-size: 18px; margin: 0 0 8px;">응답 테스트</h2>
    <p class="hint">실제 톡톡 호출 없이 AI 답변 결과를 확인합니다.</p>
    <div class="test-row">
      <input id="testInput" placeholder="예: 배송 언제 와요?" />
      <button id="testBtn">테스트</button>
    </div>
    <div id="testResult">결과가 여기에 표시됩니다.</div>

    <script>
      const API_BASE = location.protocol === "file:" ? "http://127.0.0.1:8001" : "";
      const statusEl = document.getElementById("status");
      const faqBody = document.getElementById("faqBody");

      async function loadFaq() {
        statusEl.textContent = "불러오는 중...";
        try {
          const res = await fetch(`${API_BASE}/faq`);
          const data = await res.json();
          const entries = Object.entries(data);
          if (entries.length === 0) {
            faqBody.innerHTML = '<tr><td colspan="2" class="empty">FAQ 항목이 없습니다. 노션에서 추가해주세요.</td></tr>';
            statusEl.textContent = "항목 없음";
            return;
          }
          faqBody.innerHTML = entries.map(([q, a]) =>
            `<tr><td><strong>${esc(q)}</strong></td><td>${esc(a)}</td></tr>`
          ).join("");
          statusEl.textContent = `${entries.length}개 항목 로드됨`;
        } catch (e) {
          faqBody.innerHTML = '<tr><td colspan="2" class="empty">불러오기 실패: 서버가 실행 중인지 확인하세요.</td></tr>';
          statusEl.textContent = "오류";
        }
      }

      async function refreshFaq() {
        statusEl.textContent = "갱신 중...";
        document.getElementById("refreshBtn").disabled = true;
        try {
          await fetch(`${API_BASE}/faq/refresh`, { method: "POST" });
          await loadFaq();
        } finally {
          document.getElementById("refreshBtn").disabled = false;
        }
      }

      async function runTest() {
        const text = document.getElementById("testInput").value;
        const out = document.getElementById("testResult");
        out.textContent = "AI 답변 생성 중...";
        try {
          const res = await fetch(`${API_BASE}/test-reply`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
          });
          const data = await res.json();
          out.textContent = data.reply;
        } catch (e) {
          out.textContent = "오류: " + e.message;
        }
      }

      function esc(str) {
        return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      }

      document.getElementById("refreshBtn").addEventListener("click", refreshFaq);
      document.getElementById("testBtn").addEventListener("click", runTest);
      document.getElementById("testInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") runTest();
      });

      loadFaq();
    </script>
  </body>
</html>
